name: Refresh Static Feeds

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Generate static feeds
        run: npm run generate:static
        working-directory: backend

      - name: Commit and push feed updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/api backend/package-lock.json backend/package.json
          if git diff --cached --quiet; then
            echo "No feed changes to commit."
            exit 0
          fi
          git commit -m "Refresh static feeds"
          git push
